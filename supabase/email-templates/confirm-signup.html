<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your email</title>
</head>
<body style="margin:0;padding:0;background-color:#f7f7f8;font-family:'Outfit',system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f7f7f8;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border-radius:12px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#16a87a;padding:32px 32px 28px;text-align:center;">
              <span style="font-size:22px;font-weight:600;color:#ffffff;letter-spacing:-0.3px;">Leadivo</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:36px 32px 40px;">
              <h1 style="margin:0 0 12px;font-size:22px;font-weight:600;color:#1a1a1a;">Confirm your email</h1>
              <p style="margin:0 0 28px;font-size:15px;line-height:1.6;color:#555555;">
                Thanks for signing up for Leadivo! Click the button below to verify your email address and get started.
              </p>
              <table cellpadding="0" cellspacing="0" style="margin:0 0 28px;">
                <tr>
                  <td style="background-color:#16a87a;border-radius:8px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:12px 32px;font-size:15px;font-weight:600;color:#ffffff;text-decoration:none;">
                      Verify Email
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 4px;font-size:13px;line-height:1.5;color:#888888;">
                If the button doesn't work, copy and paste this link into your browser:
              </p>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#16a87a;word-break:break-all;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:0 32px 28px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#aaaaaa;">
                &copy; {{ .SiteURL }} &mdash; Leadivo
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
